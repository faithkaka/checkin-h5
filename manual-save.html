<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>手动保存分享数据</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 0; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    pre { background: #f0f0f0; padding: 15px; border-radius: 5px; overflow: auto; max-height: 400px; font-size: 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin: 10px 0; background: #fff; }
    img { max-width: 200px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>💾 手动保存分享数据</h1>
  <p>这个工具可以直接将管理后台的图片数据保存到 Supabase。</p>
  
  <div class="card">
    <h3>第 1 步：从管理后台复制数据</h3>
    <p>1. 打开 <a href="http://localhost:8080/admin-share.html" target="_blank">管理后台</a></p>
    <p>2. 按 F12 打开控制台</p>
    <p>3. 粘贴并执行：<code>console.log(JSON.stringify(shareData))</code></p>
    <p>4. 复制输出的 JSON 数据</p>
    <textarea id="jsonData" placeholder="在这里粘贴复制的 shareData JSON..." style="width:100%;height:200px;font-family:monospace;font-size:12px;"></textarea>
  </div>
  
  <button class="btn" id="saveBtn" onclick="saveToSupabase()">💾 保存到 Supabase</button>
  
  <div id="result"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ussvekkgyntubivhfext.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzc3Zla2tneW50dWJpdmhmZXh0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTEwODQwMiwiZXhwIjoyMDkwNjg0NDAyfQ.i1fbQC96UGnToKL6fa7GTfaMtt0s_TGpNNR0xb3ufR0';
    let supabaseClient = null;
    
    async function saveToSupabase() {
      const btn = document.getElementById('saveBtn');
      const result = document.getElementById('result');
      const jsonInput = document.getElementById('jsonData').value.trim();
      
      if (!jsonInput) {
        alert('请先粘贴 shareData JSON 数据！');
        return;
      }
      
      try {
        const shareData = JSON.parse(jsonInput);
        console.log('解析成功:', shareData);
        
        // 验证数据结构
        if (!shareData.images || !Array.isArray(shareData.images)) {
          throw new Error('无效的 shareData：缺少 images 数组');
        }
        
        result.innerHTML = '<p>正在连接 Supabase...</p>';
        btn.disabled = true;
        btn.textContent = '保存中...';
        
        // 创建客户端
        if (!supabaseClient) {
          supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
        
        // 保存数据
        const { data, error } = await supabaseClient
          .from('share_resources')
          .upsert({ 
            type: 'share', 
            data: shareData,
            updated_at: new Date().toISOString()
          }, { onConflict: 'type' });
        
        if (error) throw error;
        
        console.log('✅ 保存成功:', data);
        
        result.innerHTML = `
          <h2 class="success">✅ 保存成功！</h2>
          <p><strong>图片数量:</strong> ${shareData.images.length}</p>
          <p><strong>文案数量:</strong> ${shareData.texts ? shareData.texts.length : 0}</p>
          <p><strong>最新图片:</strong></p>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0;">
            ${shareData.images.slice(-3).map(img => `
              <div style="border:1px solid #ddd;border-radius:4px;padding:8px;">
                <img src="${img.url}" style="width:100%;height:80px;object-fit:cover;" />
                <p style="font-size:11px;margin:5px 0 0;">${img.desc || '无描述'}</p>
              </div>
            `).join('')}
          </div>
          <p>现在刷新 <a href="http://localhost:8080/index.html?page=share" target="_blank">分享页面</a> 应该能看到所有图片了！</p>
        `;
        
      } catch (e) {
        console.error('❌ 保存失败:', e);
        result.innerHTML = `
          <h2 class="error">❌ 保存失败</h2>
          <p>${e.message}</p>
          <pre>${e.stack}</pre>
        `;
        btn.disabled = false;
        btn.textContent = '💾 保存到 Supabase';
      }
    }
  </script>
</body>
</html>
