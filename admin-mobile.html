<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>重庆打卡 - 管理后台</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
    }
    
    /* 登录页面 */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    .login-box {
      background: white;
      padding: 30px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 360px;
    }
    
    .login-box h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      -webkit-appearance: none;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #10b981;
    }
    
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      -webkit-appearance: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      width: 100%;
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    /* 管理后台 */
    .admin-layout {
      display: none;
      min-height: 100vh;
    }
    
    .admin-layout.active {
      display: block;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .admin-info {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .logout-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }
    
    .content {
      padding: 20px;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    .stat-card h3 {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 10px;
    }
    
    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #10b981;
    }
    
    .stat-card.danger .value { color: #ef4444; }
    .stat-card.warning .value { color: #f59e0b; }
    
    /* 表格 */
    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .table-header {
      padding: 15px 20px;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .table-header h3 {
      font-size: 16px;
      color: #333;
    }
    
    .table-wrapper {
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    thead {
      background: #f9fafb;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e5e5e5;
    }
    
    th {
      font-weight: 600;
      color: #6b7280;
      white-space: nowrap;
    }
    
    tbody tr:active {
      background: #f3f4f6;
    }
    
    .code {
      font-family: 'Courier New', monospace;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      word-break: break-all;
    }
    
    /* 标签页 */
    .tabs {
      display: flex;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: white;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    
    .tab-btn.active {
      color: #10b981;
      border-bottom-color: #10b981;
    }
    
    /* 页面 */
    .page {
      display: none;
    }
    
    .page.active {
      display: block;
    }
    
    /* 加载动画 */
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    
    .spinner {
      border: 3px solid #e0e0e0;
      border-top-color: #10b981;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 刷新按钮 */
    .refresh-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    
    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      th, td {
        padding: 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- 登录页面 -->
  <div class="login-container" id="login-page">
    <div class="login-box">
      <h1>🔐 管理后台登录</h1>
      
      <div class="error-msg" id="login-error"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label>管理员名称</label>
          <input type="text" id="admin-name" placeholder="输入管理员名称" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="admin-password" placeholder="输入密码" autocomplete="off" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">登 录</button>
      </form>
      
      <div style="margin-top: 20px; text-align: center; color: #999; font-size: 13px;">
        默认账号：admin / admin123
      </div>
    </div>
  </div>
  
  <!-- 管理后台 -->
  <div class="admin-layout" id="admin-layout">
    <div class="header">
      <h1>🎯 打卡管理后台</h1>
      <div class="admin-info">管理员：<span id="admin-display"></span></div>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
    
    <div class="content">
      <!-- 标签页导航 -->
      <div class="tabs">
        <button class="tab-btn active" onclick="showPage('dashboard')">📊 数据</button>
        <button class="tab-btn" onclick="showPage('users')">👥 用户</button>
        <button class="tab-btn" onclick="showPage('checkins')">📍 打卡</button>
      </div>
      
      <!-- 数据概览页 -->
      <div class="page active" id="page-dashboard">
        <div class="stats-grid">
          <div class="stat-card">
            <h3>总用户数</h3>
            <div class="value" id="stat-users">-</div>
          </div>
          <div class="stat-card">
            <h3>今日打卡</h3>
            <div class="value" id="stat-today">-</div>
          </div>
          <div class="stat-card warning">
            <h3>总打卡数</h3>
            <div class="value" id="stat-total">-</div>
          </div>
          <div class="stat-card danger">
            <h3>最高积分</h3>
            <div class="value" id="stat-max">-</div>
          </div>
        </div>
        
        <div class="table-container">
          <div class="table-header">
            <h3>🏆 TOP 10 排行榜</h3>
            <button class="refresh-btn" onclick="loadDashboard()">🔄 刷新</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>排名</th><th>用户</th><th>积分</th></tr>
              </thead>
              <tbody id="leaderboard-body">
                <tr><td colspan="3"><div class="loading"><div class="spinner"></div>加载中...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
      <!-- 用户管理页 -->
      <div class="page" id="page-users">
        <div class="table-container">
          <div class="table-header">
            <h3>所有用户</h3>
            <button class="refresh-btn" onclick="loadUsers()">🔄 刷新</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>用户 ID</th><th>积分</th><th>打卡数</th></tr>
              </thead>
              <tbody id="users-body">
                <tr><td colspan="3"><div class="loading"><div class="spinner"></div>加载中...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
      <!-- 打卡记录页 -->
      <div class="page" id="page-checkins">
        <div class="table-container">
          <div class="table-header">
            <h3>打卡记录</h3>
            <button class="refresh-btn" onclick="loadCheckins()">🔄 刷新</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>用户</th><th>打卡点</th><th>积分</th><th>时间</th></tr>
              </thead>
              <tbody id="checkins-body">
                <tr><td colspan="4"><div class="loading"><div class="spinner"></div>加载中...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://ussvekkgyntubivhfext.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzc3Zla2tneW50dWJpdmhmZXh0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTEwODQwMiwiZXhwIjoyMDkwNjg0NDAyfQ.i1fbQC96UGnToKL6fa7GTfaMtt0s_TGpNNR0xb3ufR0';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // 管理员凭据
    const ADMIN_CREDENTIALS = {
      name: 'admin',
      password: 'admin123'
    };
    
    let currentUser = null;
    
    // 页面加载
    window.addEventListener('DOMContentLoaded', () => {
      console.log('页面加载完成');
      try {
        checkLogin();
      } catch (err) {
        console.error('初始化失败:', err);
        alert('初始化失败：' + err.message);
      }
    });
    
    // 检查登录状态
    function checkLogin() {
      try {
        const logged = sessionStorage.getItem('admin_logged');
        const adminName = sessionStorage.getItem('admin_name');
        
        console.log('登录状态:', logged, adminName);
        
        if (logged === 'true' && adminName) {
          currentUser = adminName;
          showAdminLayout();
        } else {
          document.getElementById('login-page').style.display = 'flex';
          document.getElementById('admin-layout').classList.remove('active');
        }
      } catch (err) {
        console.error('检查登录失败:', err);
      }
    }
    
    // 登录表单
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('admin-name').value.trim();
      const password = document.getElementById('admin-password').value;
      const loginBtn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('login-error');
      
      console.log('登录尝试:', { name, password });
      
      errorDiv.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      setTimeout(() => {
        if (name === ADMIN_CREDENTIALS.name && password === ADMIN_CREDENTIALS.password) {
          console.log('登录成功');
          try {
            sessionStorage.setItem('admin_logged', 'true');
            sessionStorage.setItem('admin_name', name);
            currentUser = name;
            showAdminLayout();
            loginBtn.disabled = false;
            loginBtn.textContent = '登 录';
          } catch (err) {
            console.error('保存登录状态失败:', err);
            errorDiv.textContent = '保存登录状态失败：' + err.message;
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.textContent = '登 录';
          }
        } else {
          console.log('登录失败');
          errorDiv.textContent = '用户名或密码错误';
          errorDiv.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = '登 录';
        }
      }, 300);
    });
    
    // 显示管理后台
    function showAdminLayout() {
      console.log('显示管理后台');
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('admin-layout').classList.add('active');
      document.getElementById('admin-display').textContent = currentUser;
      loadDashboard();
    }
    
    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        try {
          sessionStorage.removeItem('admin_logged');
          sessionStorage.removeItem('admin_name');
        } catch (e) {}
        location.reload();
      }
    }
    
    // 页面切换
    function showPage(pageName) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById('page-' + pageName).classList.add('active');
      document.querySelector('[onclick="showPage(\'' + pageName + '\')"]').classList.add('active');
      
      if (pageName === 'dashboard') loadDashboard();
      if (pageName === 'users') loadUsers();
      if (pageName === 'checkins') loadCheckins();
    }
    
    // 加载仪表板
    async function loadDashboard() {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = '<tr><td colspan="3"><div class="loading"><div class="spinner"></div>加载中...</div></td></tr>';
      
      try {
        console.log('加载仪表板数据...');
        const { data: users, error: usersError } = await supabase.from('users').select('*').order('points', { ascending: false }).limit(10);
        
        if (usersError) throw usersError;
        
        const { data: checkins, error: checkinsError } = await supabase.from('checkins').select('checked_at');
        if (checkinsError) throw checkinsError;
        
        const today = new Date().toISOString().split('T')[0];
        const todayCheckins = checkins.filter(c => c.checked_at && c.checked_at.startsWith(today));
        
        const maxPoints = users.length > 0 ? Math.max(...users.map(u => u.points || 0)) : 0;
        
        document.getElementById('stat-users').textContent = users.length;
        document.getElementById('stat-today').textContent = todayCheckins.length;
        document.getElementById('stat-total').textContent = checkins.length;
        document.getElementById('stat-max').textContent = maxPoints;
        
        if (users && users.length > 0) {
          tbody.innerHTML = users.map((u, i) => `
            <tr>
              <td><strong>#${i+1}</strong></td>
              <td><span class="code">${u.alipay_user_id ? u.alipay_user_id.substring(0, 20) + '...' : '-'}</span></td>
              <td><strong>${u.points || 0}</strong></td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#999;">暂无数据</td></tr>';
        }
      } catch (err) {
        console.error('加载仪表板失败:', err);
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#ef4444;">加载失败<br><small>' + err.message + '</small></td></tr>';
      }
    }
    
    // 加载用户
    async function loadUsers() {
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = '<tr><td colspan="3"><div class="loading"><div class="spinner"></div>加载中...</div></td></tr>';
      
      try {
        const { data: users, error } = await supabase.from('users').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        
        if (users && users.length > 0) {
          tbody.innerHTML = users.map((u, i) => `
            <tr>
              <td><span class="code">${u.alipay_user_id ? u.alipay_user_id.substring(0, 15) + '...' : '-'}</span></td>
              <td>${u.points || 0}</td>
              <td>-</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#999;">暂无用户</td></tr>';
        }
      } catch (err) {
        console.error('加载用户失败:', err);
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#ef4444;">加载失败<br><small>' + err.message + '</small></td></tr>';
      }
    }
    
    // 加载打卡记录
    async function loadCheckins() {
      const tbody = document.getElementById('checkins-body');
      tbody.innerHTML = '<tr><td colspan="4"><div class="loading"><div class="spinner"></div>加载中...</div></td></tr>';
      
      try {
        const { data: checkins, error } = await supabase.from('checkins').select('*').order('checked_at', { ascending: false }).limit(50);
        if (error) throw error;
        
        if (checkins && checkins.length > 0) {
          tbody.innerHTML = checkins.map((c, i) => `
            <tr>
              <td><span class="code">${c.alipay_user_id ? c.alipay_user_id.substring(0, 10) + '...' : '-'}</span></td>
              <td>点${c.checkpoint_id}</td>
              <td>${c.points || 0}</td>
              <td>${c.checked_at ? new Date(c.checked_at).toLocaleDateString('zh-CN') : '-'}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:#999;">暂无打卡记录</td></tr>';
        }
      } catch (err) {
        console.error('加载打卡记录失败:', err);
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:#ef4444;">加载失败<br><small>' + err.message + '</small></td></tr>';
      }
    }
  </script>
</body>
</html>
