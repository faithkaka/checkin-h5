<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理后台登录</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- 后备方案：3 秒自动刷新 -->
  <meta http-equiv="refresh" content="3">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: white;
      padding: 30px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 30px; color: #333; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
    }
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      text-align: left;
    }
    .success {
      background: #d1fae5;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      text-align: center;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .note {
      margin-top: 20px;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🔐 管理后台登录</h1>
    
    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>
    
    <form id="login-form" action="admin.html" method="GET">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" name="username" placeholder="输入用户名" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" name="password" placeholder="输入密码" required autocomplete="off" />
      </div>
      <button type="submit" class="btn" id="submit-btn">
        登 录
      </button>
    </form>
    
    <div class="note">默认账号：admin / admin123</div>
    <div class="note" id="redirect-note" style="display:none; color: #10b981; font-weight: 600; margin-top: 15px;">
      ✅ 登录成功！正在跳转...
    </div>
  </div>
  
  <script>
    const credentials = {
      username: 'admin',
      password: 'admin123'
    };
    
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const redirectNote = document.getElementById('redirect-note');
    
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      console.log('登录尝试:', username, password);
      
      // 验证
      if (username !== credentials.username || password !== credentials.password) {
        errorMsg.textContent = '❌ 用户名或密码错误';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        return;
      }
      
      // 成功
      errorMsg.style.display = 'none';
      successMsg.innerHTML = '<span class="loading"></span> 登录成功！正在跳转...';
      successMsg.style.display = 'block';
      redirectNote.style.display = 'block';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '登录成功';
      
      console.log('登录成功，准备跳转');
      
      // 设置标记
      try {
        localStorage.setItem('admin_logged', 'true');
        localStorage.setItem('admin_name', username);
      } catch (err) {
        console.warn('localStorage 不可用:', err);
      }
      
      // 方法 1: 直接跳转（最可靠）
      console.log('使用 location.replace 跳转');
      window.location.replace('admin.html?logged=true&username=' + encodeURIComponent(username));
      
      // 方法 2: 后备方案（1.5 秒后如果还没跳转）
      setTimeout(function() {
        console.log('后备方案：使用 href 跳转');
        window.location.href = 'admin.html?logged=true&username=' + encodeURIComponent(username);
      }, 1500);
      
      // 方法 3: 超时强制刷新（3 秒后）
      setTimeout(function() {
        console.log('强制刷新');
        window.location.href = 'admin.html?forced=true&username=' + encodeURIComponent(username);
      }, 3000);
    });
    
    // 页面加载时检查
    window.addEventListener('DOMContentLoaded', function() {
      console.log('页面加载完成');
      // 清除可能的旧标记
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      redirectNote.style.display = 'none';
      submitBtn.disabled = false;
      submitBtn.innerHTML = '登 录';
    });
  </script>
</body>
</html>
