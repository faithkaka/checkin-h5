<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付宝用户测试 - 重庆打卡</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-top: 20px;
    }
    h1 {
      color: #333;
      text-align: center;
    }
    .user-info {
      background: #f0f9ff;
      border: 2px solid #0ea5e9;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    .user-id {
      font-size: 18px;
      font-weight: bold;
      color: #0369a1;
      word-break: break-all;
    }
    .test-section {
      margin: 30px 0;
    }
    .test-btn {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin: 10px 0;
      transition: transform 0.2s;
    }
    .test-btn:active {
      transform: scale(0.98);
    }
    .test-btn.secondary {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
    }
    .test-btn.danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }
    .log-area {
      background: #1f2937;
      color: #10b981;
      border-radius: 8px;
      padding: 15px;
      font-family: monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log-entry {
      margin: 5px 0;
      border-bottom: 1px solid #374151;
      padding: 5px 0;
    }
    .input-group {
      margin: 15px 0;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .checkin-status {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    .status-item {
      text-align: center;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 12px;
    }
    .status-item.checked {
      background: #d1fae5;
      border: 2px solid #10b981;
    }
    .status-icon {
      font-size: 24px;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 支付宝用户测试</h1>
    
    <div class="user-info">
      <div>当前用户 ID:</div>
      <div class="user-id" id="current-user-id">加载中...</div>
      <div style="margin-top: 10px; color: #666;">
        支付宝环境：<span id="alipay-env">检测中...</span>
      </div>
    </div>
    
    <div class="test-section">
      <h3>📝 打卡状态</h3>
      <div class="checkin-status" id="checkin-status">
        <!-- 状态将在这里显示 -->
      </div>
      <div style="text-align: center; margin-top: 15px; font-size: 18px; font-weight: bold;">
        当前积分：<span id="current-points" style="color: #10b981;">0</span> 分
      </div>
    </div>
    
    <div class="test-section">
      <h3>🔄 切换用户（测试用）</h3>
      <div class="input-group">
        <label>输入用户 ID:</label>
        <input type="text" id="new-user-id" placeholder="例如：user123 或 alipay_xxx" />
      </div>
      <button class="test-btn" onclick="switchUser()">切换用户</button>
      <button class="test-btn secondary" onclick="generateRandomUser()">生成随机用户</button>
    </div>
    
    <div class="test-section">
      <h3>🗑️ 数据管理</h3>
      <button class="test-btn danger" onclick="clearUserData()">清除当前用户数据</button>
      <button class="test-btn secondary" onclick="clearAllData()">清除所有数据</button>
      <button class="test-btn" onclick="exportData()">导出数据</button>
    </div>
    
    <div class="test-section">
      <h3>📊 操作日志</h3>
      <div class="log-area" id="log-area">
        <!-- 日志将在这里显示 -->
      </div>
    </div>
    
    <div class="test-section" style="text-align: center; margin-top: 30px;">
      <a href="index.html" class="test-btn" style="display: inline-block; text-decoration: none;">返回首页</a>
    </div>
  </div>
  
  <script src="js/alipay-user.js"></script>
  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      AlipayUserManager.init();
      updateDisplay();
      log('🚀 测试页面初始化完成');
      log('👤 用户 ID: ' + AlipayUserManager.userId);
      log('📱 支付宝环境：' + (AlipayUserManager.isAlipay ? '是' : '否'));
    });
    
    // 更新显示
    function updateDisplay() {
      document.getElementById('current-user-id').textContent = AlipayUserManager.userId || '未识别';
      document.getElementById('alipay-env').textContent = AlipayUserManager.isAlipay ? '✅ 是' : '❌ 否';
      
      // 加载用户数据
      const userData = AlipayUserManager.getUserData('checkin_data');
      const points = userData ? userData.points : 0;
      const checkpoints = userData ? userData.checkpoints : [];
      
      document.getElementById('current-points').textContent = points;
      
      // 更新打卡状态
      const statusHtml = checkpoints.map(cp => `
        <div class="status-item ${cp.checked ? 'checked' : ''}">
          <span class="status-icon">${cp.checked ? '✅' : '⬜'}</span>
          <div>景点${cp.id}</div>
        </div>
      `).join('');
      document.getElementById('checkin-status').innerHTML = statusHtml;
    }
    
    // 切换用户
    function switchUser() {
      const newUserId = document.getElementById('new-user-id').value.trim();
      if (!newUserId) {
        alert('请输入用户 ID');
        return;
      }
      
      AlipayUserManager.switchUser(newUserId);
      updateDisplay();
      log('🔄 切换到用户：' + newUserId);
      
      // 跳转到首页
      setTimeout(() => {
        window.location.href = 'index.html?userId=' + newUserId;
      }, 500);
    }
    
    // 生成随机用户
    function generateRandomUser() {
      const randomId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      document.getElementById('new-user-id').value = randomId;
      log('🎲 生成随机用户 ID: ' + randomId);
    }
    
    // 清除当前用户数据
    function clearUserData() {
      if (!confirm('确定要清除当前用户的所有打卡数据吗？')) return;
      
      AlipayUserManager.clearUserData();
      updateDisplay();
      log('🗑️ 已清除用户数据');
    }
    
    // 清除所有数据
    function clearAllData() {
      if (!confirm('确定要清除所有用户的数据吗？\n\n此操作不可恢复！')) return;
      
      localStorage.clear();
      log('🗑️ 已清除所有数据');
      updateDisplay();
    }
    
    // 导出数据
    function exportData() {
      const allData = {};
      const keys = Object.keys(localStorage);
      
      keys.forEach(key => {
        if (key.startsWith('alipay_')) {
          allData[key] = localStorage.getItem(key);
        }
      });
      
      const dataStr = JSON.stringify(allData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'checkin_data_' + Date.now() + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      log('📤 已导出数据 (' + keys.filter(k => k.startsWith('alipay_')).length + ' 条记录)');
    }
    
    // 日志
    function log(message) {
      const logArea = document.getElementById('log-area');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logArea.insertBefore(entry, logArea.firstChild);
      
      // 限制日志数量
      while (logArea.children.length > 100) {
        logArea.removeChild(logArea.lastChild);
      }
    }
  </script>
</body>
</html>
