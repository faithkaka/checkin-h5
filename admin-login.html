<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>重庆打卡 - 管理后台</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
    .login-box { background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 360px; }
    .login-box h1 { text-align: center; margin-bottom: 30px; color: #333; font-size: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 14px; }
    .form-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; -webkit-appearance: none; }
    .form-group input:focus { outline: none; border-color: #10b981; }
    .btn { padding: 14px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
    .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; width: 100%; }
    .btn-primary:active { transform: scale(0.98); }
    .error-msg { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
    .success-msg { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div class="login-container" id="login-page">
    <div class="login-box">
      <h1>🔐 管理后台登录</h1>
      
      <div class="error-msg" id="login-error"></div>
      <div class="success-msg" id="login-success"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label>管理员名称</label>
          <input type="text" id="admin-name" placeholder="输入管理员名称" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="admin-password" placeholder="输入密码" autocomplete="off" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">登 录</button>
      </form>
      
      <div style="margin-top: 20px; text-align: center; color: #999; font-size: 13px;">
        默认账号：admin / admin123
      </div>
      <div style="margin-top: 10px; text-align: center; color: #666; font-size: 12px;">
        登录后 3 秒跳转到管理后台
      </div>
    </div>
  </div>
  
  <script>
    // 管理员凭据
    const ADMIN_CREDENTIALS = {
      name: 'admin',
      password: 'admin123'
    };
    
    // 页面加载
    window.addEventListener('DOMContentLoaded', function() {
      console.log('页面加载完成');
    });
    
    // 登录表单
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      var name = document.getElementById('admin-name').value.trim();
      var password = document.getElementById('admin-password').value;
      var loginBtn = document.getElementById('login-btn');
      var errorDiv = document.getElementById('login-error');
      var successDiv = document.getElementById('login-success');
      
      console.log('尝试登录:', { name: name, password: password });
      console.log('期望:', { name: ADMIN_CREDENTIALS.name, password: ADMIN_CREDENTIALS.password });
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      setTimeout(function() {
        if (name === ADMIN_CREDENTIALS.name && password === ADMIN_CREDENTIALS.password) {
          console.log('登录成功！');
          errorDiv.style.display = 'none';
          successDiv.textContent = '✅ 登录成功！正在跳转...';
          successDiv.style.display = 'block';
          loginBtn.textContent = '登录成功！';
          
          // 保存到 cookie（比 localStorage 更可靠）
          document.cookie = 'admin_logged=true; path=/; max-age=86400';
          document.cookie = 'admin_name=' + name + '; path=/; max-age=86400';
          
          // 3 秒后跳转到管理后台
          setTimeout(function() {
            window.location.href = 'admin.html?logged=true&name=' + encodeURIComponent(name);
          }, 1500);
        } else {
          console.log('登录失败！');
          errorDiv.textContent = '❌ 用户名或密码错误\n\n默认账号：\n用户名：admin\n密码：admin123';
          errorDiv.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = '登 录';
        }
      }, 500);
    });
  </script>
</body>
</html>
