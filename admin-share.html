<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>分享资源管理 - 重庆打卡</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f0f2f5; padding-bottom: 30px; }
    header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px 15px; text-align: center; }
    header h1 { font-size: 20px; margin-bottom: 5px; }
    header .subtitle { font-size: 13px; opacity: 0.9; }
    
    .container { padding: 15px; }
    .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .section h2 { font-size: 16px; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    .checkpoint-section { margin-bottom: 25px; }
    .checkpoint-title { font-size: 15px; font-weight: 600; color: #667eea; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .add-image-btn { background: #10b981; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 18px; }
    
    .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .image-item { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 2px solid #e0e0e0; position: relative; }
    .image-item img { width: 100%; height: 100%; object-fit: cover; }
    .image-item .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; padding: 4px 6px; font-size: 11px; }
    .image-item .edit-btn, .image-item .delete-btn { position: absolute; width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; }
    .image-item .delete-btn { top: 5px; left: 5px; background: rgba(239,68,68,0.9); color: white; font-size: 12px; }
    .image-item .edit-btn { top: 5px; right: 5px; background: rgba(255,255,255,0.9); }
    
    .text-list { display: flex; flex-direction: column; gap: 10px; }
    .text-item { background: #f9fafb; padding: 12px; border-radius: 8px; border-left: 3px solid #667eea; position: relative; }
    .text-item .delete-btn { position: absolute; top: 8px; right: 8px; background: #fee2e2; color: #dc2626; border: none; border-radius: 4px; padding: 4px 8px; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
    .modal h3 { font-size: 18px; margin-bottom: 15px; text-align: center; }
    .modal label { display: block; margin-bottom: 8px; font-size: 14px; color: #666; }
    .modal input, .modal textarea, .modal select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
    .modal textarea { min-height: 100px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; margin-top: 0; }
    .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; padding: 12px; cursor: pointer; }
    .btn-cancel { background: #f3f4f6 !important; color: #666; }
    
    .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 15px; }
    .upload-area.dragover { border-color: #667eea; background: #dbeafe; }
    .preview-image { width: 100%; border-radius: 8px; margin-bottom: 15px; }
    
    .status-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 24px; border-radius: 24px; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .status-toast.show { opacity: 1; }
    .status-toast.error { background: #ef4444; }
    
    .btn-save-all { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 8px; padding: 14px; width: 100%; font-size: 15px; cursor: pointer; margin-top: 20px; }
    .back-btn { position: fixed; bottom: 20px; right: 20px; background: #667eea; color: white; border: none; border-radius: 50%; width: 56px; height: 56px; font-size: 24px; cursor: pointer; }
  </style>
</head>
<body>
  <header><h1>📸 分享资源管理</h1><div class="subtitle">管理景点图片和分享文案</div></header>
  
  <div class="container">
    <div class="section"><h2>🖼️ 景点图片</h2><div id="images-container"></div></div>
    <div class="section"><h2>✏️ 分享文案</h2><p style="color:#666;font-size:13px;margin-bottom:15px;">💡 使用 <code style="background:#f3f4f6;padding:2px 6px;">{points}</code> 占位符</p><div class="text-list" id="texts-container"></div><button class="btn" onclick="openTextModal(-1)">➕ 添加文案</button></div>
    <button class="btn-save-all" onclick="saveAll()">💾 保存所有修改</button>
  </div>
  
  <button class="back-btn" onclick="history.back()">↩</button>
  <div class="status-toast" id="toast"></div>
  
  <div class="modal-overlay" id="image-modal">
    <div class="modal">
      <h3 id="image-modal-title">🖼️ 编辑图片</h3>
      <label>景点</label><select id="edit-image-checkpoint"><option value="1">🏢 解放碑</option><option value="2">🚝 李子坝</option><option value="3">🎨 鹅岭二厂</option><option value="4">🌳 南山一棵树</option><option value="5">🌉 洪崖洞</option></select>
      <label>预览</label><img id="edit-image-preview" class="preview-image" src="" />
      <label>上传</label><div class="upload-area" id="upload-area" onclick="document.getElementById('edit-image-file').click()"><div style="font-size:32px;">📁</div><div style="font-size:13px;color:#666;">点击或拖拽上传</div></div><input type="file" id="edit-image-file" accept="image/*" style="display:none;" />
      <label>或输入 URL</label><input type="text" id="edit-image-url" placeholder="https://..." />
      <label>描述</label><input type="text" id="edit-image-desc" placeholder="图片描述" />
      <div class="modal-actions"><button class="btn btn-cancel" onclick="closeImageModal()">取消</button><button class="btn" onclick="saveImageEdit()">保存</button></div>
    </div>
  </div>
  
  <div class="modal-overlay" id="text-modal">
    <div class="modal">
      <h3 id="text-modal-title">✏️ 编辑文案</h3>
      <textarea id="edit-text-content" placeholder="输入文案...使用 {points} 占位符"></textarea>
      <div class="modal-actions"><button class="btn btn-cancel" onclick="closeTextModal()">取消</button><button class="btn" onclick="saveTextEdit()">保存</button></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
  <script>
    // 全局变量
    var supabaseClient = null;
    var shareData = { images: [], texts: [] };
    var editingImageIndex = -1;
    var editingTextIndex = -1;
    var currentImageFile = null;
    
    var SUPABASE_URL = 'https://ussvekkgyntubivhfext.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzc3Zla2tneW50dWJpdmhmZXh0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTEwODQwMiwiZXhwIjoyMDkwNjg0NDAyfQ.i1fbQC96UGnToKL6fa7GTfaMtt0s_TGpNNR0xb3ufR0';
    
    var checkpoints = [
      { id: 1, name: '解放碑步行街', icon: '🏢' },
      { id: 2, name: '李子坝轻轨站', icon: '🚝' },
      { id: 3, name: '鹅岭二厂文创园', icon: '🎨' },
      { id: 4, name: '南山一棵树观景台', icon: '🌳' },
      { id: 5, name: '洪崖洞 + 千厮门大桥', icon: '🌉' }
    ];
    
    var defaultImages = [
      { id: 'jfbei_1', checkpointId: 1, url: 'https://images.unsplash.com/photo-1599689018248-b3e9e089e8c2?w=600', desc: '🏢 解放碑' },
      { id: 'jfbei_2', checkpointId: 1, url: 'https://images.unsplash.com/photo-1478131333081-31f9a7e96847?w=600', desc: '🏙️ 商业中心' },
      { id: 'jfbei_3', checkpointId: 1, url: 'https://images.unsplash.com/photo-1519508235410-4e1a9881c138?w=600', desc: '🌃 夜景' },
      { id: 'liziba_1', checkpointId: 2, url: 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600', desc: '🚝 轻轨穿楼' },
      { id: 'liziba_2', checkpointId: 2, url: 'https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=600', desc: '🚄 轻轨 2 号线' },
      { id: 'liziba_3', checkpointId: 2, url: 'https://images.unsplash.com/photo-1520639888713-78db11c0a1a3?w=600', desc: '🚇 站台' },
      { id: 'eling_1', checkpointId: 3, url: 'https://images.unsplash.com/photo-1560185127-6ed189bf02f4?w=600', desc: '🎨 二厂' },
      { id: 'eling_2', checkpointId: 3, url: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600', desc: '🖼️ 文艺' },
      { id: 'eling_3', checkpointId: 3, url: 'https://images.unsplash.com/photo-1550950158-d0d960dff51b?w=600', desc: '🎭 电影取景' },
      { id: 'nanshan_1', checkpointId: 4, url: 'https://images.unsplash.com/photo-1506459225024-1428096a4b2e?w=600', desc: '🌳 观景台' },
      { id: 'nanshan_2', checkpointId: 4, url: 'https://images.unsplash.com/photo-1518182170546-0766aaefcd09?w=600', desc: '🌆 夜景' },
      { id: 'nanshan_3', checkpointId: 4, url: 'https://images.unsplash.com/photo-1506459225024-1428096a4b2e?w=600', desc: '🌇 全景' },
      { id: 'hongya_1', checkpointId: 5, url: 'https://images.unsplash.com/photo-1548265047-181289a4168f?w=600', desc: '🌉 洪崖洞' },
      { id: 'hongya_2', checkpointId: 5, url: 'https://images.unsplash.com/photo-1554672408-730436b60dde?w=600', desc: '🏮 千与千寻' },
      { id: 'hongya_3', checkpointId: 5, url: 'https://images.unsplash.com/photo-1553913861-c0fddf2166ab?w=600', desc: '🌃 大桥' }
    ];
    
    var defaultTexts = [
      '我在"趣玩重庆一日游"打卡活动中，已经获得 {points} 积分！',
      '🎉 重庆一日游太好玩了！打卡了 {points} 积分！',
      '🎊 山城重庆之旅完美收官！{points} 积分到手！',
      '🌟 打卡重庆成功！{points} 积分见证我的旅程！',
      '✨ 重庆一日游完美收官！{points} 积分解锁！',
      '🎈 8D 魔幻城市！{points} 积分打卡成功！',
      '💫 山城打卡完成！{points} 积分收入囊中！',
      '🌈 雾都探索完成！{points} 积分到手！'
    ];
    
    function getSupabase() {
      if (!supabaseClient) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
      return supabaseClient;
    }
    
    function showToast(msg, isError) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'status-toast show' + (isError ? ' error' : '');
      setTimeout(function() { t.className = 'status-toast'; }, 2000);
    }
    
    async function init() {
      await loadShareData();
      renderImages();
      renderTexts();
      setupDragDrop();
    }
    
    async function loadShareData() {
      try {
        var client = getSupabase();
        var result = await client.from('share_resources').select('data').eq('type', 'share').single();
        if (result.data && result.data.data) {
          shareData = result.data.data;
        } else {
          shareData = { images: defaultImages.slice(), texts: defaultTexts.slice() };
        }
      } catch (e) {
        console.error('Load error:', e);
        shareData = { images: defaultImages.slice(), texts: defaultTexts.slice() };
        showToast('使用默认数据');
      }
    }
    
    function renderImages() {
      var html = '';
      checkpoints.forEach(function(cp) {
        var imgs = shareData.images.filter(function(img) { return img.checkpointId === cp.id; });
        html += '<div class="checkpoint-section"><div class="checkpoint-title"><span>'+cp.icon+' '+cp.name+'</span><button class="add-image-btn" onclick="openImageModal(-1, '+cp.id+')">+</button></div><div class="image-grid">';
        imgs.forEach(function(img, idx) {
          var globalIdx = shareData.images.indexOf(img);
          html += '<div class="image-item"><img src="'+img.url+'" onerror="this.src=\'data:image/svg+xml,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' width=\\\'100\\\' height=\\\'100\\\'><rect fill=\\\'%23ddd\\\' width=\\\'100\\\' height=\\\'100\\\'/><text x=\\\'50\\\' y=\\\'50\\\' text-anchor=\\\'middle\\\' fill=\\\'%23999\\\'>图片</text></svg>\'" /><div class="overlay">'+(img.desc||'')+'</div><button class="delete-btn" onclick="deleteImage('+globalIdx+')">×</button><button class="edit-btn" onclick="openImageModal('+globalIdx+')">✏️</button></div>';
        });
        html += '</div></div>';
      });
      document.getElementById('images-container').innerHTML = html;
    }
    
    function renderTexts() {
      var html = '';
      shareData.texts.forEach(function(text, idx) {
        html += '<div class="text-item"><p>'+text+'</p><button class="delete-btn" onclick="deleteText('+idx+')">删除</button></div>';
      });
      document.getElementById('texts-container').innerHTML = html;
    }
    
    function openImageModal(idx, cpId) {
      editingImageIndex = idx;
      var isNew = idx < 0;
      document.getElementById('image-modal-title').textContent = isNew ? '➕ 添加图片' : '✏️ 编辑图片';
      document.getElementById('edit-image-checkpoint').value = (cpId || 1).toString();
      document.getElementById('edit-image-url').value = '';
      document.getElementById('edit-image-desc').value = '';
      document.getElementById('edit-image-preview').src = '';
      currentImageFile = null;
      
      if (!isNew) {
        var img = shareData.images[idx];
        document.getElementById('edit-image-checkpoint').value = img.checkpointId.toString();
        document.getElementById('edit-image-url').value = img.url;
        document.getElementById('edit-image-desc').value = img.desc || '';
        document.getElementById('edit-image-preview').src = img.url;
      }
      document.getElementById('image-modal').classList.add('show');
    }
    
    function closeImageModal() {
      document.getElementById('image-modal').classList.remove('show');
    }
    
    function handleFileSelect(input) {
      var file = input.files[0];
      if (file) {
        currentImageFile = file;
        var reader = new FileReader();
        reader.onload = function(e) { document.getElementById('edit-image-preview').src = e.target.result; };
        reader.readAsDataURL(file);
      }
    }
    
    function setupDragDrop() {
      var area = document.getElementById('upload-area');
      var input = document.getElementById('edit-image-file');
      
      input.onchange = handleFileSelect;
      
      area.ondragover = function(e) { e.preventDefault(); area.classList.add('dragover'); };
      area.ondragleave = function() { area.classList.remove('dragover'); };
      area.ondrop = function(e) {
        e.preventDefault();
        area.classList.remove('dragover');
        var file = e.dataTransfer.files[0];
        if (file) {
          currentImageFile = file;
          var reader = new FileReader();
          reader.onload = function(ev) { document.getElementById('edit-image-preview').src = ev.target.result; };
          reader.readAsDataURL(file);
        }
      };
    }
    
    async function saveImageEdit() {
      var cpId = parseInt(document.getElementById('edit-image-checkpoint').value);
      var url = document.getElementById('edit-image-url').value.trim();
      var desc = document.getElementById('edit-image-desc').value.trim();
      var preview = document.getElementById('edit-image-preview').src;
      var finalUrl = url || preview;
      
      if (currentImageFile) {
        showToast('上传中...');
        try {
          var client = getSupabase();
          var fileName = 'share_' + Date.now() + '_' + currentImageFile.name;
          var upResult = await client.storage.from('share-images').upload(fileName, currentImageFile, { upsert: true });
          if (upResult.error) throw upResult.error;
          var urlResult = client.storage.from('share-images').getPublicUrl(fileName);
          finalUrl = urlResult.data.publicUrl;
          showToast('上传成功！');
        } catch (e) {
          console.error('Upload failed:', e);
          finalUrl = preview;
        }
      }
      
      if (!finalUrl) { showToast('请选择图片', true); return; }
      
      var cp = checkpoints.find(function(c) { return c.id === cpId; });
      
      if (editingImageIndex >= 0) {
        shareData.images[editingImageIndex] = { id: shareData.images[editingImageIndex].id, checkpointId: cpId, url: finalUrl, desc: desc || cp.name };
      } else {
        shareData.images.push({ id: 'custom_' + Date.now(), checkpointId: cpId, url: finalUrl, desc: desc || cp.name });
      }
      
      closeImageModal();
      renderImages();
      showToast('已保存');
    }
    
    function deleteImage(idx) {
      if (confirm('确定删除？')) {
        shareData.images.splice(idx, 1);
        renderImages();
      }
    }
    
    function openTextModal(idx) {
      editingTextIndex = idx;
      var isNew = idx < 0;
      document.getElementById('text-modal-title').textContent = isNew ? '➕ 添加文案' : '✏️ 编辑文案';
      document.getElementById('edit-text-content').value = isNew ? '' : shareData.texts[idx];
      document.getElementById('text-modal').classList.add('show');
    }
    
    function closeTextModal() {
      document.getElementById('text-modal').classList.remove('show');
    }
    
    function saveTextEdit() {
      var text = document.getElementById('edit-text-content').value.trim();
      if (!text) { showToast('请输入文案', true); return; }
      
      if (editingTextIndex >= 0) {
        shareData.texts[editingTextIndex] = text;
      } else {
        shareData.texts.push(text);
      }
      closeTextModal();
      renderTexts();
      showToast('已保存');
    }
    
    function deleteText(idx) {
      if (confirm('确定删除？')) {
        shareData.texts.splice(idx, 1);
        renderTexts();
      }
    }
    
    async function saveAll() {
      var btn = event.target;
      btn.disabled = true;
      btn.textContent = '保存中...';
      
      try {
        var client = getSupabase();
        var result = await client.from('share_resources').upsert({ type: 'share', data: shareData, updated_at: new Date().toISOString() }, { onConflict: 'type' });
        if (result.error) throw result.error;
        showToast('✅ 保存成功！');
      } catch (e) {
        console.error('Save failed:', e);
        showToast('保存失败：' + e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 保存所有修改';
      }
    }
    
    document.getElementById('edit-image-url').oninput = function() {
      if (!currentImageFile) {
        document.getElementById('edit-image-preview').src = this.value;
      }
    };
    
    init();
  </script>
</body>
</html>
