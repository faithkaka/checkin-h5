<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>趣玩重庆一日游 - 打卡挑战</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- 首屏关键 CSS 内联（优化加载速度） -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow-x: hidden; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; opacity: 0; transition: opacity 0.3s ease; }
    body.loaded { opacity: 1; }
    .page { display: none; min-height: 100vh; position: relative; }
    .page.active { display: block; }
    .map-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 0; pointer-events: none; }
    @keyframes pulse-bg { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner { border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: white; margin-top: 15px; font-size: 16px; }
  </style>
  
  <link rel="stylesheet" href="css/style.css">
</head>
