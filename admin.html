<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重庆打卡 - 管理后台</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
    
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 20px; margin-bottom: 10px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; }
    
    .content { padding: 15px; max-width: 800px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .stat h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
    .stat .num { font-size: 24px; font-weight: bold; color: #10b981; }
    .stat.warn .num { color: #f59e0b; }
    .stat.danger .num { color: #ef4444; }
    
    .section { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .section h2 { font-size: 16px; margin-bottom: 15px; color: #333; display: flex; justify-content: space-between; align-items: center; }
    
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { background: #f9fafb; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e5e5e5; }
    th { font-weight: 600; color: #666; font-size: 12px; }
    .code { background: #f3f4f6; padding: 3px 6px; border-radius: 4px; font-size: 11px; display: inline-block; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .loading { text-align: center; padding: 30px; color: #999; }
    .spinner { border: 3px solid #e5e5e5; border-top-color: #10b981; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .refresh { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .tabs { display: flex; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .tab { flex: 1; padding: 12px; border: none; background: white; color: #666; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab.active { color: #10b981; border-bottom-color: #10b981; background: #f0fdf4; }
    .page { display: none; }
    .page.active { display: block; }
    .error { background: #fef2f2; color: #dc2626; padding: 15px; border-radius: 8px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 重庆打卡管理后台</h1>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
  
  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="showTab('dashboard')">📊 数据</button>
      <button class="tab" onclick="showTab('users')">👥 用户</button>
      <button class="tab" onclick="showTab('checkins')">📍 打卡</button>
    </div>
    
    <div class="page active" id="dashboard">
      <div class="stats">
        <div class="stat">
          <h3>总用户数</h3>
          <div class="num" id="stat-users">-</div>
        </div>
        <div class="stat">
          <h3>今日打卡</h3>
          <div class="num" id="stat-today">-</div>
        </div>
        <div class="stat warn">
          <h3>总打卡数</h3>
          <div class="num" id="stat-total">-</div>
        </div>
        <div class="stat danger">
          <h3>最高积分</h3>
          <div class="num" id="stat-max">-</div>
        </div>
      </div>
      
      <div class="section">
        <h2>🏆 TOP 10 排行榜 <button class="refresh" onclick="loadDashboard()">🔄 刷新</button></h2>
        <div class="loading" id="dash-loading"><div class="spinner"></div>加载中...</div>
        <div class="error" id="dash-error" style="display:none;"></div>
        <table id="dash-table" style="display:none;">
          <thead><tr><th>排名</th><th>用户 ID</th><th>积分</th><th>时间</th></tr></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>
    
    <div class="page" id="users">
      <div class="section">
        <h2>所有用户 <button class="refresh" onclick="loadUsers()">🔄 刷新</button></h2>
        <div class="loading" id="users-loading"><div class="spinner"></div>加载中...</div>
        <div class="error" id="users-error" style="display:none;"></div>
        <table id="users-table" style="display:none;">
          <thead><tr><th>用户 ID</th><th>积分</th><th>注册时间</th></tr></thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
    
    <div class="page" id="checkins">
      <div class="section">
        <h2>打卡记录 <button class="refresh" onclick="loadCheckins()">🔄 刷新</button></h2>
        <div class="loading" id="checkins-loading"><div class="spinner"></div>加载中...</div>
        <div class="error" id="checkins-error" style="display:none;"></div>
        <table id="checkins-table" style="display:none;">
          <thead><tr><th>用户</th><th>打卡点</th><th>积分</th><th>时间</th></tr></thead>
          <tbody id="checkins-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ussvekkgyntubivhfext.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzc3Zla2tneW50dWJpdmhmZXh0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTEwODQwMiwiZXhwIjoyMDkwNjg0NDAyfQ.i1fbQC96UGnToKL6fa7GTfaMtt0s_TGpNNR0xb3ufR0';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let isLive = true;
    
    window.addEventListener('DOMContentLoaded', () => {
      console.log('管理后台加载完成');
      loadDashboard();
    });
    
    function logout() {
      if (confirm('确定退出？')) {
        isLive = false;
        localStorage.removeItem('admin_logged');
        localStorage.removeItem('admin_name');
        window.location.href = 'login.html';
      }
    }
    
    function showTab(tabName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
      
      if (tabName === 'dashboard') loadDashboard();
      if (tabName === 'users') loadUsers();
      if (tabName === 'checkins') loadCheckins();
    }
    
    async function loadDashboard() {
      const loadingEl = document.getElementById('dash-loading');
      const errorEl = document.getElementById('dash-error');
      const tableEl = document.getElementById('dash-table');
      
      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      tableEl.style.display = 'none';
      
      try {
        console.log('查询用户数据...');
        const { data: users, error: usersError } = await supabase
          .from('users')
          .select('*')
          .order('points', { ascending: false })
          .limit(100)
          .then(p => Promise.race([p, timeoutPromise(8000)]));
        
        if (!isLive) return;
        if (usersError) throw usersError;
        
        console.log('查询打卡记录...');
        const { data: checkins, error: checkinsError } = await supabase
          .from('checkins')
          .select('checked_at')
          .limit(500)
          .then(p => Promise.race([p, timeoutPromise(8000)]));
        
        if (!isLive) return;
        if (checkinsError) throw checkinsError;
        
        // 统计
        const today = new Date().toISOString().split('T')[0];
        const todayCount = checkins.filter(c => c.checked_at && c.checked_at.startsWith(today)).length;
        const maxPoints = users.length > 0 ? Math.max(...users.map(u => u.points || 0)) : 0;
        
        document.getElementById('stat-users').textContent = users.length;
        document.getElementById('stat-today').textContent = todayCount;
        document.getElementById('stat-total').textContent = checkins.length;
        document.getElementById('stat-max').textContent = maxPoints;
        
        // 排行榜
        if (users.length > 0) {
          document.getElementById('leaderboard-body').innerHTML = users.slice(0, 10).map((u, i) => {
            const uid = (u.alipay_user_id || '未知').substring(0, 25);
            const date = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
            return `<tr>
              <td><b>#${i+1}</b></td>
              <td><span class="code" title="${u.alipay_user_id || ''}">${uid}</span></td>
              <td><b style="color:#10b981">${u.points || 0}</b></td>
              <td>${date}</td>
            </tr>`;
          }).join('');
          tableEl.style.display = 'table';
        } else {
          loadingEl.innerHTML = '暂无数据';
        }
        loadingEl.style.display = users.length > 0 ? 'none' : 'block';
        
      } catch (err) {
        console.error('加载失败:', err);
        loadingEl.style.display = 'none';
        errorEl.textContent = '❌ 加载失败：' + err.message + '<br>请刷新重试';
        errorEl.style.display = 'block';
      }
    }
    
    async function loadUsers() {
      const loadingEl = document.getElementById('users-loading');
      const errorEl = document.getElementById('users-error');
      const tableEl = document.getElementById('users-table');
      
      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      tableEl.style.display = 'none';
      
      try {
        const { data, error } = await supabase
          .from('users')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(100)
          .then(p => Promise.race([p, timeoutPromise(8000)]));
        
        if (!isLive) return;
        if (error) throw error;
        
        if (data && data.length > 0) {
          document.getElementById('users-body').innerHTML = data.map(u => {
            const uid = (u.alipay_user_id || '未知').substring(0, 25);
            const date = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
            return `<tr>
              <td><span class="code" title="${u.alipay_user_id || ''}">${uid}</span></td>
              <td><b>${u.points || 0}</b></td>
              <td>${date}</td>
            </tr>`;
          }).join('');
          tableEl.style.display = 'table';
          loadingEl.style.display = 'none';
        } else {
          loadingEl.innerHTML = '暂无用户';
        }
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.textContent = '❌ 加载失败：' + err.message;
        errorEl.style.display = 'block';
      }
    }
    
    async function loadCheckins() {
      const loadingEl = document.getElementById('checkins-loading');
      const errorEl = document.getElementById('checkins-error');
      const tableEl = document.getElementById('checkins-table');
      
      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      tableEl.style.display = 'none';
      
      try {
        const { data, error } = await supabase
          .from('checkins')
          .select('*')
          .order('checked_at', { ascending: false })
          .limit(50)
          .then(p => Promise.race([p, timeoutPromise(8000)]));
        
        if (!isLive) return;
        if (error) throw error;
        
        if (data && data.length > 0) {
          document.getElementById('checkins-body').innerHTML = data.map(c => {
            const uid = (c.alipay_user_id || '未知').substring(0, 20);
            const date = c.checked_at ? new Date(c.checked_at).toLocaleString('zh-CN') : '-';
            return `<tr>
              <td><span class="code" title="${c.alipay_user_id || ''}">${uid}</span></td>
              <td>点${c.checkpoint_id}</td>
              <td>${c.points || 0}</td>
              <td>${date}</td>
            </tr>`;
          }).join('');
          tableEl.style.display = 'table';
          loadingEl.style.display = 'none';
        } else {
          loadingEl.innerHTML = '暂无记录';
        }
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.textContent = '❌ 加载失败：' + err.message;
        errorEl.style.display = 'block';
      }
    }
    
    function timeoutPromise(ms) {
      return new Promise((_, reject) => {
        setTimeout(() => reject(new Error('请求超时，请刷新重试')), ms);
      });
    }
  </script>
</body>
</html>
