<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理后台 - 重庆打卡</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
    
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 20px; margin-bottom: 10px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; }
    
    .content { padding: 15px; max-width: 900px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .stat h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
    .stat .num { font-size: 24px; font-weight: bold; color: #10b981; }
    .stat.warn .num { color: #f59e0b; }
    .stat.danger .num { color: #ef4444; }
    
    .section { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .section h2 { font-size: 16px; margin-bottom: 15px; color: #333; display: flex; justify-content: space-between; align-items: center; }
    
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { background: #f9fafb; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e5e5e5; }
    th { font-weight: 600; color: #666; font-size: 12px; }
    .code { background: #f3f4f6; padding: 3px 6px; border-radius: 4px; font-size: 11px; display: inline-block; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .loading { text-align: center; padding: 30px; color: #999; }
    .spinner { border: 3px solid #e5e5e5; border-top-color: #10b981; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .refresh { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .tabs { display: flex; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .tab { flex: 1; padding: 12px; border: none; background: white; color: #666; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab.active { color: #10b981; border-bottom-color: #10b981; background: #f0fdf4; }
    .page { display: none; }
    .page.active { display: block; }
    .error { background: #fef2f2; color: #dc2626; padding: 15px; border-radius: 8px; margin: 15px 0; }
    .empty { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 重庆打卡管理后台</h1>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
  
  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="showTab('dashboard')">📊 数据</button>
      <button class="tab" onclick="showTab('users')">👥 用户</button>
      <button class="tab" onclick="showTab('checkins')">📍 打卡</button>
    </div>
    
    <div class="page active" id="dashboard">
      <div class="stats">
        <div class="stat">
          <h3>总用户数</h3>
          <div class="num" id="stat-users">-</div>
        </div>
        <div class="stat">
          <h3>今日打卡</h3>
          <div class="num" id="stat-today">-</div>
        </div>
        <div class="stat warn">
          <h3>总打卡数</h3>
          <div class="num" id="stat-total">-</div>
        </div>
        <div class="stat danger">
          <h3>最高积分</h3>
          <div class="num" id="stat-max">-</div>
        </div>
      </div>
      
      <div class="section">
        <h2>🏆 TOP 10 排行榜 <button class="refresh" onclick="loadDashboard()">🔄 刷新</button></h2>
        <div class="loading" id="dash-loading"><div class="spinner"></div>加载中...</div>
        <div class="error" id="dash-error" style="display:none;"></div>
        <div class="empty" id="dash-empty" style="display:none;">暂无数据</div>
        <table id="dash-table" style="display:none;">
          <thead><tr><th>排名</th><th>用户 ID</th><th>积分</th><th>注册时间</th></tr></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>
    
    <div class="page" id="users">
      <div class="section">
        <h2>所有用户 <button class="refresh" onclick="loadUsers()">🔄 刷新</button></h2>
        <div class="loading" id="users-loading"><div class="spinner"></div>加载中...</div>
        <div class="error" id="users-error" style="display:none;"></div>
        <div class="empty" id="users-empty" style="display:none;">暂无用户</div>
        <table id="users-table" style="display:none;">
          <thead><tr><th>用户 ID</th><th>积分</th><th>注册时间</th></tr></thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
    
    <div class="page" id="checkins">
      <div class="section">
        <h2>打卡记录 <button class="refresh" onclick="loadCheckins()">🔄 刷新</button></h2>
        <div class="loading" id="checkins-loading"><div class="spinner"></div>加载中...</div>
        <div class="error" id="checkins-error" style="display:none;"></div>
        <div class="empty" id="checkins-empty" style="display:none;">暂无记录</div>
        <table id="checkins-table" style="display:none;">
          <thead><tr><th>用户</th><th>打卡点</th><th>积分</th><th>打卡时间</th></tr></thead>
          <tbody id="checkins-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://ussvekkgyntubivhfext.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzc3Zla2tneW50dWJpdmhmZXh0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTEwODQwMiwiZXhwIjoyMDkwNjg0NDAyfQ.i1fbQC96UGnToKL6fa7GTfaMtt0s_TGpNNR0xb3ufR0';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let isLive = true;
    
    // 页面加载
    window.addEventListener('DOMContentLoaded', function() {
      console.log('管理后台加载完成');
      loadDashboard();
    });
    
    // 退出登录
    function logout() {
      if (confirm('确定退出？')) {
        isLive = false;
        localStorage.removeItem('admin_logged');
        localStorage.removeItem('admin_name');
        location.href = 'login.html';
      }
    }
    
    // 切换标签页
    function showTab(tabName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelector('[onclick="showTab(\'' + tabName + '\')"]').classList.add('active');
      
      if (tabName === 'dashboard') loadDashboard();
      if (tabName === 'users') loadUsers();
      if (tabName === 'checkins') loadCheckins();
    }
    
    // 加载仪表板
    async function loadDashboard() {
      var loadingEl = document.getElementById('dash-loading');
      var errorEl = document.getElementById('dash-error');
      var emptyEl = document.getElementById('dash-empty');
      var tableEl = document.getElementById('dash-table');
      
      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      emptyEl.style.display = 'none';
      tableEl.style.display = 'none';
      
      try {
        console.log('开始查询用户数据...');
        
        // 查询用户 - 按积分排序
        var usersResponse = supabase
          .from('users')
          .select('id, alipay_user_id, points, created_at')
          .order('points', { ascending: false })
          .limit(100);
        
        // 设置超时
        var usersPromise = Promise.race([
          usersResponse,
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('请求超时（8 秒）')); }, 8000);
          })
        ]);
        
        var usersResult = await usersPromise;
        
        if (!isLive) return;
        
        if (usersResult.error) {
          console.error('用户查询错误:', usersResult.error);
          throw new Error('用户数据错误：' + usersResult.error.message);
        }
        
        var users = usersResult.data || [];
        console.log('获取到用户数:', users.length);
        
        // 查询打卡记录
        console.log('开始查询打卡记录...');
        var checkinsResponse = supabase
          .from('checkins')
          .select('checked_at')
          .limit(500);
        
        var checkinsPromise = Promise.race([
          checkinsResponse,
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('请求超时（8 秒）')); }, 8000);
          })
        ]);
        
        var checkinsResult = await checkinsPromise;
        
        if (!isLive) return;
        
        if (checkinsResult.error) {
          console.error('打卡记录查询错误:', checkinsResult.error);
          throw new Error('打卡记录错误：' + checkinsResult.error.message);
        }
        
        var checkins = checkinsResult.data || [];
        console.log('获取到打卡记录数:', checkins.length);
        
        // 计算统计数据
        var today = new Date().toISOString().split('T')[0];
        var todayCount = 0;
        for (var i = 0; i < checkins.length; i++) {
          if (checkins[i].checked_at && checkins[i].checked_at.startsWith(today)) {
            todayCount++;
          }
        }
        
        var maxPoints = 0;
        if (users.length > 0) {
          for (var j = 0; j < users.length; j++) {
            if ((users[j].points || 0) > maxPoints) {
              maxPoints = users[j].points || 0;
            }
          }
        }
        
        // 更新统计卡片
        document.getElementById('stat-users').textContent = users.length;
        document.getElementById('stat-today').textContent = todayCount;
        document.getElementById('stat-total').textContent = checkins.length;
        document.getElementById('stat-max').textContent = maxPoints;
        
        // 显示排行榜
        if (users.length > 0) {
          var tbody = document.getElementById('leaderboard-body');
          var rows = '';
          for (var k = 0; k < Math.min(users.length, 10); k++) {
            var u = users[k];
            var uid = u.alipay_user_id || ('user_' + u.id);
            var shortUid = uid.length > 30 ? uid.substring(0, 30) + '...' : uid;
            var regDate = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
            rows += '<tr>' +
              '<td><b>#' + (k + 1) + '</b></td>' +
              '<td><span class="code" title="' + uid + '">' + shortUid + '</span></td>' +
              '<td><b style="color:#10b981">' + (u.points || 0) + '</b></td>' +
              '<td>' + regDate + '</td>' +
            '</tr>';
          }
          tbody.innerHTML = rows;
          loadingEl.style.display = 'none';
          tableEl.style.display = 'table';
        } else {
          loadingEl.style.display = 'none';
          emptyEl.style.display = 'block';
        }
        
      } catch (err) {
        console.error('加载仪表板失败:', err);
        loadingEl.style.display = 'none';
        errorEl.innerHTML = '<b>❌ 加载失败</b><br>' + err.message + '<br><br>请刷新重试';
        errorEl.style.display = 'block';
      }
    }
    
    // 加载用户列表
    async function loadUsers() {
      var loadingEl = document.getElementById('users-loading');
      var errorEl = document.getElementById('users-error');
      var emptyEl = document.getElementById('users-empty');
      var tableEl = document.getElementById('users-table');
      
      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      emptyEl.style.display = 'none';
      tableEl.style.display = 'none';
      
      try {
        var response = supabase
          .from('users')
          .select('id, alipay_user_id, points, created_at')
          .order('created_at', { ascending: false })
          .limit(100);
        
        var result = await Promise.race([
          response,
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('请求超时')); }, 8000);
          })
        ]);
        
        if (!isLive) return;
        if (result.error) throw result.error;
        
        var data = result.data || [];
        
        if (data.length > 0) {
          var tbody = document.getElementById('users-body');
          var rows = '';
          for (var i = 0; i < data.length; i++) {
            var u = data[i];
            var uid = u.alipay_user_id || ('user_' + u.id);
            var shortUid = uid.length > 30 ? uid.substring(0, 30) + '...' : uid;
            var regDate = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
            rows += '<tr>' +
              '<td><span class="code" title="' + uid + '">' + shortUid + '</span></td>' +
              '<td><b>' + (u.points || 0) + '</b></td>' +
              '<td>' + regDate + '</td>' +
            '</tr>';
          }
          tbody.innerHTML = rows;
          loadingEl.style.display = 'none';
          tableEl.style.display = 'table';
        } else {
          loadingEl.style.display = 'none';
          emptyEl.style.display = 'block';
        }
        
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.textContent = '❌ 加载失败：' + err.message;
        errorEl.style.display = 'block';
      }
    }
    
    // 加载打卡记录
    async function loadCheckins() {
      var loadingEl = document.getElementById('checkins-loading');
      var errorEl = document.getElementById('checkins-error');
      var emptyEl = document.getElementById('checkins-empty');
      var tableEl = document.getElementById('checkins-table');
      
      loadingEl.style.display = 'block';
      errorEl.style.display = 'none';
      emptyEl.style.display = 'none';
      tableEl.style.display = 'none';
      
      try {
        var response = supabase
          .from('checkins')
          .select('alipay_user_id, checkpoint_id, points, checked_at')
          .order('checked_at', { ascending: false })
          .limit(50);
        
        var result = await Promise.race([
          response,
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('请求超时')); }, 8000);
          })
        ]);
        
        if (!isLive) return;
        if (result.error) throw result.error;
        
        var data = result.data || [];
        
        if (data.length > 0) {
          var tbody = document.getElementById('checkins-body');
          var rows = '';
          for (var i = 0; i < data.length; i++) {
            var c = data[i];
            var uid = c.alipay_user_id || '未知';
            var shortUid = uid.length > 20 ? uid.substring(0, 20) + '...' : uid;
            var dateStr = c.checked_at ? new Date(c.checked_at).toLocaleString('zh-CN') : '-';
            rows += '<tr>' +
              '<td><span class="code" title="' + uid + '">' + shortUid + '</span></td>' +
              '<td>打卡点 ' + c.checkpoint_id + '</td>' +
              '<td>' + (c.points || 0) + '</td>' +
              '<td>' + dateStr + '</td>' +
            '</tr>';
          }
          tbody.innerHTML = rows;
          loadingEl.style.display = 'none';
          tableEl.style.display = 'table';
        } else {
          loadingEl.style.display = 'none';
          emptyEl.style.display = 'block';
        }
        
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.textContent = '❌ 加载失败：' + err.message;
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
